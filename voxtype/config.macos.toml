engine = "cohere"
state_file = "auto"

[hotkey]
enabled = true
key = "RIGHTOPTION"
mode = "push_to_talk"
modifiers = []

[audio]
device = "default"
sample_rate = 16000
max_duration_secs = 60

[cohere]
model = "cohere-transcribe-q4f16"
language = "en"
on_demand_loading = false

[vad]
enabled = true
backend = "energy"
threshold = 0.5
min_speech_duration_ms = 100

[osd]
enabled = false

[output]
mode = "type"
fallback_to_clipboard = true
type_delay_ms = 0
pre_type_delay_ms = 150
wait_for_modifier_release = true
modifier_release_timeout_ms = 1500

[output.notification]
on_recording_start = false
on_recording_stop = false
on_transcription = false
