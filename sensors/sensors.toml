# ASUS Pro WS WRX90E-SAGE SE. Board telemetry comes from the in-tree `asusec`
# driver (temps + fans) and `k10temp` (CPU Tctl); both expose their own labels,
# so these blocks only set grouping/ordering and let the driver labels stand.

[display]
show_unconfigured = false

[[devices]]
match = "k10temp"
label = "CPU"
group = "Board"
order = 5

[[devices]]
match = "asusec"
label = "Motherboard"
group = "Board"
order = 10

# Order CPU_Opt just ahead of the nct6798 CPU fan so the two sit together.
[[devices.sensors]]
key = "fan1"           # CPU_Opt
order = 95

# Disconnected VRM-heatsink fan headers (read 0 — no fan wired).
[[devices.sensors]]
key = "fan2"           # VRME HS
hidden = true

[[devices.sensors]]
key = "fan3"           # VRMW HS
hidden = true

# Nuvoton NCT6798D Super-I/O chip. The asusec EC driver deliberately skips it,
# but it carries the system temp and the CPU/chassis fan headers the EC doesn't
# report. Requires the `nct6775` kernel module (see README). Driver labels are
# cryptic and many channels are unconnected on this AMD platform, so curate:
# keep SYSTIN + the real fans, hide CPU-duplicate temps and the dummy PCH_*/
# unconnected AUXTIN probes. Fan-header numbers are best mapped to physical
# headers one at a time via BIOS Q-Fan, then relabeled below.
[[devices]]
match = "nct6798"
label = "Super-I/O"
group = "Board"
order = 15

[[devices.sensors]]
key = "temp1"          # SYSTIN
label = "System"
order = 10

# CPU-redundant temps (already covered by k10temp Tctl + asusec CPU Package).
[[devices.sensors]]
key = "temp2"          # CPUTIN
hidden = true

[[devices.sensors]]
key = "temp8"          # PECI Agent 0
hidden = true

[[devices.sensors]]
key = "temp13"         # TSI0_TEMP
hidden = true

# Unconnected AUXTIN probes (read garbage-low / ambient).
[[devices.sensors]]
key = "temp3"
hidden = true

[[devices.sensors]]
key = "temp4"
hidden = true

[[devices.sensors]]
key = "temp5"
hidden = true

[[devices.sensors]]
key = "temp6"
hidden = true

[[devices.sensors]]
key = "temp7"
hidden = true

# PCH_* registers — no PCH on Threadripper, always 0.
[[devices.sensors]]
key = "temp9"
hidden = true

[[devices.sensors]]
key = "temp10"
hidden = true

[[devices.sensors]]
key = "temp11"
hidden = true

[[devices.sensors]]
key = "temp12"
hidden = true

# Fan headers, identified by monitoring under CPU load:
# fan6 tracks CPU_Opt almost exactly -> CPU header. The other three hold a fixed
# RPM order (fan3 > fan2 > fan4); since larger fans spin slower, that maps to
# 80mm > 140mm > 180mm by diameter.
[[devices.sensors]]
key = "fan6"           # mimics CPU_Opt
label = "CPU"
order = 96

[[devices.sensors]]
key = "fan3"           # fastest of the trio
label = "back80"
order = 100

[[devices.sensors]]
key = "fan2"
label = "back140"
order = 110

[[devices.sensors]]
key = "fan4"           # slowest of the trio
label = "front"
order = 120

# Disconnected fan headers (read 0 across repeated samples — no fan wired).
[[devices.sensors]]
key = "fan1"
hidden = true

[[devices.sensors]]
key = "fan5"
hidden = true

[[devices.sensors]]
key = "fan7"
hidden = true

[psu]
enabled = true
device = "/dev/msi-ai1600t"
timeout = 2.0
label = "Power supply"
group = "Power"
order = 200

[[psu.metrics]]
key = "output_power"
label = "Output"
order = 10

[[psu.metrics]]
key = "input_power"
label = "Input"
order = 15

[[psu.metrics]]
key = "efficiency"
label = "Efficiency"
order = 20

[[psu.metrics]]
key = "fan_speed"
label = "PSU fan"
order = 30

[gpu]
enabled = true
provider = "auto"
label = "GPU"
order = 150
