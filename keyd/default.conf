# swap alt and ctrl
# capslock -> esc
# alt-tab -> meta-tab
# alt-space -> launcher
# alt-shift-4 -> GNOME drag-to-select area screenshot

[ids]
*

[main]
leftalt = layer(altmap_left)
rightalt = layer(altmap_right)
leftcontrol = layer(ctrlmap_left)
capslock = overload(nav, esc)
bluetooth = f16
sysrq = print
config = sysrq
# Copilot keys commonly emit leftshift+leftmeta+f23. Convert that chord to a
# plain F23 key so Voxtype can use it as a push-to-talk hotkey.
leftshift+leftmeta+f23 = f23
f14 = leftalt
f16 = print
print = print
compose = f23
menu = f23

[nav]
h = left
l = right
k = up
j = down
` = capslock

[ctrlmap_left:A]
1 = C-1
2 = C-2
3 = C-3
4 = C-4
5 = C-5
6 = C-6
7 = C-7
8 = C-8
9 = C-9
tab = C-tab
z = C-z
x = C-x
c = C-c
v = C-v

[altmap_left:C]
1 = A-1
2 = A-2
3 = A-3
4 = A-4
5 = A-5
6 = A-6
7 = A-7
8 = A-8
9 = A-9
space = M-/
d = M-d
c = C-insert
v = S-insert
x = S-delete
left = A-left
right = A-right
tab = swapm(app_switch, M-tab)
` = swapm(window_switch, M-`)

[altmap_left+shift]
3 = S-print
4 = print
5 = print
] = C-S-]
[ = C-S-[

[altmap_right:C]

[app_switch:M]
tab = M-tab

[window_switch:M]
` = M-`
