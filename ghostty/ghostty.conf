theme = "light:monokai-custom-light.theme,dark:monokai-custom.theme"
font-size = 14
macos-titlebar-style = "tabs"
# gtk-titlebar-style = "tabs"
gtk-titlebar-hide-when-maximized = true
keybind = shift+insert=paste_from_clipboard
# Send Cmd-1..9 to terminal apps as Alt/Meta-1..9 for Herdr tab switching.
keybind = cmd+digit_1=esc:1
keybind = cmd+1=esc:1
keybind = cmd+digit_2=esc:2
keybind = cmd+2=esc:2
keybind = cmd+digit_3=esc:3
keybind = cmd+3=esc:3
keybind = cmd+digit_4=esc:4
keybind = cmd+4=esc:4
keybind = cmd+digit_5=esc:5
keybind = cmd+5=esc:5
keybind = cmd+digit_6=esc:6
keybind = cmd+6=esc:6
keybind = cmd+digit_7=esc:7
keybind = cmd+7=esc:7
keybind = cmd+digit_8=esc:8
keybind = cmd+8=esc:8
keybind = cmd+digit_9=esc:9
keybind = cmd+9=esc:9
keybind = all:ctrl+shift+left=csi:1;6D
keybind = all:ctrl+shift+right=csi:1;6C
keybind = all:ctrl+shift+up=csi:1;6A
keybind = all:ctrl+shift+down=csi:1;6B
app-notifications = true
maximize = true
cursor-style = block
cursor-style-blink = false
shell-integration-features = no-cursor
window-theme = ghostty

# infocmp -x xterm-ghostty | ssh your-host -- tic -x -
shell-integration-features = ssh-terminfo,ssh-env
