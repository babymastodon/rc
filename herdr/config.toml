onboarding = false

[theme]
name = "terminal"

[ui]
confirm_close = true
agent_panel_scope = "all"
prompt_new_tab_name = false

show_agent_labels_on_pane_borders = false
[ui.toast]
delivery = "terminal"

[keys]
detach = "d"
previous_tab = "shift+left"
next_tab = "shift+right"
previous_workspace = "ctrl+shift+tab"
next_workspace = "ctrl+tab"

[keys.indexed]
tabs = "ctrl"
