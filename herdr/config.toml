onboarding = false

[theme]
name = "terminal"

[theme.custom]
accent = "green"
selection_bg = "darkgrey"
selection_fg = "preserve"

[ui]
confirm_close = true
agent_panel_scope = "all"
prompt_new_tab_name = false

show_agent_labels_on_pane_borders = false
[ui.toast]
delivery = "terminal"

[keys]
detach = "prefix+d"
previous_tab = "shift+left"
next_tab = "shift+right"
previous_workspace = "shift+up"
next_workspace = "shift+down"
previous_agent = "ctrl+up"
next_agent = "ctrl+down"
focus_pane_left = ["prefix+h", "ctrl+shift+left"]
focus_pane_down = ["prefix+j", "ctrl+shift+down"]
focus_pane_up = ["prefix+k", "ctrl+shift+up"]
focus_pane_right = ["prefix+l", "ctrl+shift+right"]

[keys.indexed]
tabs = "alt"
workspaces = "ctrl"
