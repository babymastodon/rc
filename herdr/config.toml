onboarding = false

[theme]
name = "terminal"

[theme.custom]
accent = "green"
selection_bg = "darkgrey"
selection_fg = "preserve"

[ui]
confirm_close = true
agent_panel_scope = "all"
prompt_new_tab_name = false

show_agent_labels_on_pane_borders = false
[ui.toast]
delivery = "terminal"

[keys]
detach = "prefix+d"
previous_tab = "shift+left"
next_tab = "shift+right"

[keys.indexed]
tabs = "alt"
workspaces = "ctrl"
